<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRCTC Modern</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root {
    --primary-blue: #08295a;
    --accent-blue: #0052cc;
    --bg-light: #f4f7fa;
    --white: #ffffff;
    --text-dark: #1e293b;
    --text-light: #64748b;
    --status-green: #16a34a;
    --border: #e2e8f0;
    --shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Inter', sans-serif;
    background-color: var(--bg-light);
}

/* Header */
.header {
    background: var(--white);
    padding: 0.5rem 2rem;
    display: flex;
    align-items: center;
    border-bottom: 1px solid var(--border);
}

.logo {
    font-weight: 800;
    font-size: 24px;
    color: var(--primary-blue);
    text-decoration: none;
    margin-right: 20px;
}

.topnav a {
    padding: 16px 20px;
    text-decoration: none;
    color: var(--text-dark);
    font-weight: 500;
}

.topnav a:hover { color: var(--accent-blue); }

/* Layout */
.container { max-width: 1200px; margin: 2rem auto; padding: 0 15px; }

.hero-section { display: flex; gap: 30px; }

.slideshow-container {
    flex: 1.2;
    height: 450px;
    background: black;
    border-radius: 16px;
    overflow: hidden;
}

.mySlides { display: none; height: 100%; }
.mySlides img { width: 100%; height: 100%; object-fit: cover; }

.search-card {
    flex: 1;
    background: white;
    border-radius: 16px;
    padding: 1.5rem;
    display: none;
}

#contentFrame {
    display: none;
    width: 100%;
    height: calc(100vh - 80px);
    border: none;
}
</style>
</head>

<body>

<header class="header">
<a href="#Home" class="logo">IRCTC</a>

<div class="topnav">
    <a href="#Home">Home</a>
    <a href="#FindTrain">Find Train</a>
    <a href="#Login/SignUp">Login / Sign Up</a>
</div>
</header>

<div id="main-content" class="container">
<div class="hero-section">

<div class="slideshow-container">
    <div class="mySlides"><img src="https://github.com/jayadeep14/hackton-web/blob/main/lo.png?raw=true"></div>
    <div class="mySlides"><img src="https://github.com/jayadeep14/hackton-web/blob/main/lo1.png?raw=true"></div>
    <div class="mySlides"><img src="https://github.com/jayadeep14/hackton-web/blob/main/lo3.png?raw=true"></div>
</div>

<section class="search-card" id="searchSection">
    <input type="text" placeholder="From"><br><br>
    <input type="text" placeholder="To"><br><br>
    <button onclick="loadNewPage('c.html')">Search Trains</button>
</section>

</div>
</div>

<iframe id="contentFrame"></iframe>

<script>
let slideIndex = 0;

const searchSection = document.getElementById("searchSection");
const mainContent = document.getElementById("main-content");
const contentFrame = document.getElementById("contentFrame");

/* Slideshow */
function showSlides() {
    let slides = document.getElementsByClassName("mySlides");
    for (let i = 0; i < slides.length; i++) slides[i].style.display = "none";
    slideIndex++;
    if (slideIndex > slides.length) slideIndex = 1;
    slides[slideIndex - 1].style.display = "block";
    setTimeout(showSlides, 3000);
}
showSlides();

/* Navigation */
function showSearchCard() {
    goHome();
    searchSection.style.display = "flex";
}

function goHome() {
    contentFrame.style.display = "none";
    contentFrame.src = "";
    mainContent.style.display = "block";
    searchSection.style.display = "none";
}

/* SINGLE load function */
function loadNewPage(url, trainData) {
    mainContent.style.display = "none";
    contentFrame.style.display = "block";
    contentFrame.src = url;

    if (trainData) {
        contentFrame.onload = function() {
            contentFrame.contentWindow.postMessage({
                type: "UPDATE_TRAIN_NAME",
                trainName: trainData
            }, "*");
        };
    }
}

/* ROUTER */
function handleRouting() {
    const hash = window.location.hash;

    if (hash === "#Login/SignUp") {
        loadNewPage("in.html");
    }
    else if (hash === "#FindTrain") {
        showSearchCard();
    }
    else {
        goHome();
    }
}

window.addEventListener("load", handleRouting);
window.addEventListener("hashchange", handleRouting);

/* Message Handling */
window.addEventListener("message", (event) => {

    if (event.data === "LOGIN_SUCCESS") {
        goHome();
        document.querySelector(".topnav a[href='#Login/SignUp']")
            .innerHTML = "Welcome, User";
    }

    if (event.data === "S1") {
        loadNewPage("e.html", "NDLS MMCT SPL");
    }

    if (event.data === "S2") {
        loadNewPage("e.html", "RAJDHANI EXP");
    }

    if (event.data === "pay") {
        loadNewPage("i.html");
    }

    if (event.data === "payme") {
        loadNewPage("D.html");
    }

    if (event.data.type === "PASSENGER_LIST_SUBMITTED") {
        const list = event.data.data;
        goHome();
        showFinalTicket(list);
        alert(`Booked ${list.length} passengers. Primary: ${list[0].name}`);
    }

}, false);

/* Final Ticket */
function showFinalTicket(passengerData) {
    loadNewPage("f.html");

    contentFrame.onload = function() {
        contentFrame.contentWindow.postMessage({
            type: "PASSENGER_LIST_SUBMITTED",
            data: passengerData
        }, "*");
    };
}
</script>

</body>
</html>
